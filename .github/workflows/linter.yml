name: Linter

# Run this workflow every time a new commit pushed to your repository
on: push

permissions:
  # contents permission to clone the repository
  contents: read
  packages: read
  # issues and pull-requests permissions to write results as pull
  # request comments. Omit them if you don't need summary comments
  issues: write
  pull-requests: write
  # To report GitHub Actions status checks. Omit if you don't need
  # to update commit status
  statuses: write

jobs:
  lint:
    name: Lint code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits
          fetch-depth: 0
          persist-credentials: false

      - name: Run Super-Linter
        uses: super-linter/super-linter@v8
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_REGEX_EXCLUDE: (.*gradle/.*|.*.github/.*|.*\.txt)
          VALIDATE_BASH: false
          # tries to format json with weird defaults, and configuring it requires adding a .biome.json file to the root, which I don't want to do.
          VALIDATE_BIOME_FORMAT: false
